version: '3.8'

services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=guru-api-key-2024
      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:password@evolution_db:5432/evolution?sslmode=disable
      # Redis
      - REDIS_ENABLED=true
      - REDIS_URI=redis://evolution_redis:6379
      - REDIS_PREFIX_KEY=evolution
      # CORS / Logs
      - LOG_LEVEL=DEBUG
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,PATCH,OPTIONS
      - CORS_CREDENTIALS=true
    networks:
      - evolution-net
    depends_on:
      - redis
      - evolution_db

  manager:
    container_name: evolution_manager
    image: evoapicloud/evolution-manager:latest
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_EVOLUTION_API_URL=http://localhost:8080
    volumes:
      - ./manager-nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
    networks:
      - evolution-net

  evolution_db:
    container_name: evolution_db
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=evolution
    networks:
      - evolution-net
    volumes:
      - evolution_db_data:/var/lib/postgresql/data

  redis:
    container_name: evolution_redis
    image: redis/redis-stack-server:latest
    restart: always
    environment:
      - REDIS_ARGS=--appendonly yes
    networks:
      evolution-net:
        aliases:
          - evolution_redis
    volumes:
      - evolution_redis_data:/data

volumes:
  evolution_redis_data:
  evolution_db_data:


networks:
  evolution-net:
    name: evolution-net
    driver: bridge
